name: meow_metrics
description: "Meow Metrics: A Flutter app for managing cat colonies and health records."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI and Material Design
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.0

  # State Management & Dependency Injection
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Local Storage
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.0

  # Networking
  http: ^1.1.0
  dio: ^5.3.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^12.0.0

  # Image & Camera
  image_picker: ^1.0.0
  image: ^4.0.0

  # Location & Maps
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.0

  # QR Scanner
  mobile_scanner: ^3.5.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Date/Time
  intl: ^0.19.0
  timezone: ^0.9.0

  # Logging
  logger: ^2.0.0

  # Utilities
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.0
  isar_generator: ^3.1.0
  riverpod_generator: ^2.3.0

  # Testing
  mocktail: ^1.0.0
  mockito: ^5.4.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
