name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
    paths:
      - 'apps/backend/**'
      - 'apps/web/**'
      - 'meow_metrics/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: meow_metrics_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        working-directory: apps/backend
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meow_metrics_test

      - name: Run tests
        working-directory: apps/backend
        run: npm run test:cov
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meow_metrics_test

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/backend/coverage/coverage-final.json
          flags: backend
          name: backend-coverage

  test-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci --legacy-peer-deps

      - name: Run tests
        working-directory: apps/web
        run: npm run test:cov

      - name: Build
        working-directory: apps/web
        run: npm run build

  build-backend:
    needs: test-backend
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        working-directory: apps/backend
        run: docker build -t meow-metrics-api:${{ github.sha }} -t meow-metrics-api:latest .

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: secrets.DOCKER_USERNAME != ''

      - name: Push to Docker Hub
        run: |
          docker tag meow-metrics-api:latest ${{ secrets.DOCKER_USERNAME }}/meow-metrics-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/meow-metrics-api:latest
        if: secrets.DOCKER_USERNAME != ''

  build-web:
    needs: test-web
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        working-directory: apps/web
        run: docker build -t meow-metrics-web:${{ github.sha }} -t meow-metrics-web:latest .

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: secrets.DOCKER_USERNAME != ''

      - name: Push to Docker Hub
        run: |
          docker tag meow-metrics-web:latest ${{ secrets.DOCKER_USERNAME }}/meow-metrics-web:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/meow-metrics-web:latest
        if: secrets.DOCKER_USERNAME != ''
